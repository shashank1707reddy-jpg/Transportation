<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width,
initial-scale=1.0">

<title>
BMTC Smart Transit AI
</title>

<!-- FONT -->
<link
rel="preconnect"
href=
"https://fonts.googleapis.com">

<link
rel="preconnect"
href=
"https://fonts.gstatic.com"
crossorigin>

<link
href=
"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<!-- LEAFLET -->
<link
rel="stylesheet"
href=
"https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
.route-stops-card{
    margin-top:20px;
}

#routeStops{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:15px;
}

.stop-card{
    background:
    rgba(59,130,246,.18);

    border:
    1px solid
    rgba(96,165,250,.25);

    padding:
    12px 18px;

    border-radius:
    14px;

    color:white;

    font-weight:600;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
    "Inter",
    sans-serif;
}

:root{

    --bg:
    #020617;

    --card:
    rgba(
        15,
        23,
        42,
        0.72
    );

    --border:
    rgba(
        255,
        255,
        255,
        0.08
    );

    --text:
    #f8fafc;

    --secondary:
    #94a3b8;

    --primary:
    #2563eb;
}

body{

    background:
    linear-gradient(
        135deg,
        #020617,
        #07142d
    );

    color:
    var(--text);

    min-height:
    100vh;

    overflow-x:
    hidden;
}

/* NAVBAR */

.navbar{

    display:flex;

    justify-content:
    space-between;

    align-items:
    center;

    padding:
    20px 40px;

    border-bottom:
    1px solid
    rgba(
        255,
        255,
        255,
        0.08
    );

    background:
    linear-gradient(
        90deg,
        rgba(
            15,
            23,
            42,
            0.95
        ),

        rgba(
            30,
            41,
            59,
            0.95
        )
    );
}

.brand{

    display:flex;

    gap:16px;

    align-items:center;
}

.logo-box{

    width:58px;

    height:58px;

    border-radius:
    20px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #60a5fa
    );

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:800;

    font-size:22px;
}

.brand h1{

    font-size:28px;

    font-weight:800;
}

.brand p{

    color:
    var(--secondary);
}

.theme-btn{

    border:none;

    padding:
    14px 22px;

    border-radius:
    18px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #60a5fa
    );

    color:white;

    font-weight:700;

    cursor:pointer;
}

/* LAYOUT */

.main-wrapper{

    display:grid;

    grid-template-columns:
    320px
    1fr;

    gap:22px;

    padding:
    24px;

    max-width:
    1800px;

    margin:auto;
}

/* SIDEBAR */

.sidebar{

    background:
    var(--card);

    border:
    1px solid
    var(--border);

    border-radius:
    30px;

    padding:
    24px;

    height:
    calc(
        100vh - 120px
    );

    position:sticky;

    top:20px;
}

.sidebar h2{

    margin-bottom:
    22px;
}

.tab-buttons{

    display:flex;

    flex-direction:
    column;

    gap:14px;
}

.tab-btn{

    border:none;

    background:
    rgba(
        255,
        255,
        255,
        0.05
    );

    color:white;

    padding:
    16px;

    border-radius:
    18px;

    text-align:left;

    cursor:pointer;

    transition:
    0.3s;
}

.tab-btn.active{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #60a5fa
    );
}

.ai-card{

    margin-top:
    30px;

    background:
    rgba(
        255,
        255,
        255,
        0.05
    );

    padding:
    22px;

    border-radius:
    24px;
}

.ai-card p{

    color:
    #cbd5e1;

    margin-top:
    10px;

    line-height:
    1.7;
}

/* CONTENT */

.content-area{

    display:flex;

    flex-direction:
    column;

    gap:20px;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.glass-card{

    background:
    var(--card);

    border:
    1px solid
    var(--border);

    border-radius:
    30px;

    padding:
    24px;
}

.route-grid{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:18px;

    margin-top:
    20px;
}

label{

    display:block;

    margin-bottom:
    12px;

    color:
    #cbd5e1;
}

select{

    width:100%;

    padding:
    16px;

    border:none;

    border-radius:
    18px;

    background:
    rgba(
        255,
        255,
        255,
        0.08
    );

    color:white;
}

select option{

    background:
    #0f172a;
}

.find-btn{

    margin-top:
    24px;

    width:100%;

    border:none;

    padding:
    18px;

    border-radius:
    22px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #60a5fa
    );

    color:white;

    font-size:16px;

    font-weight:700;

    cursor:pointer;
}

#map{
    height:400px;
    width:100%;
    border-radius:20px;
    overflow:hidden;
}

.bus-grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(
            260px,
            1fr
        )
    );

    gap:18px;

    margin-top:
    20px;
}

.bus-card{

    background:
    rgba(
        255,
        255,
        255,
        0.05
    );

    border-radius:
    22px;

    padding:
    20px;
}

.insight-box{

    margin-top:
    20px;

    background:
    rgba(
        255,
        255,
        255,
        0.05
    );

    padding:
    22px;

    border-radius:
    20px;
}

</style>
</head>
<body>

<nav class="navbar">

    <div class="brand">

        <div class="logo-box">
            AI
        </div>

        <div>

            <h1>
                BMTC Smart Transit AI
            </h1>

            <p>
                Bengaluru Smart Transit System
            </p>

        </div>

    </div>



</nav>

<div class="main-wrapper">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <h2>
            Smart Navigation
        </h2>

        <div class="tab-buttons">

            <button
                class="tab-btn active"
                onclick="openTab(
                'planner',
                this
                )">

                Route Planner

            </button>

            <button
                class="tab-btn"
                onclick="openTab(
                'buses',
                this
                )">

                Active Buses

            </button>

            <button
                class="tab-btn"
                onclick="openTab(
                'insights',
                this
                )">

                AI Insights

            </button>

        </div>

        <div class="ai-card">

            <h3>
                Smart AI Status
            </h3>

            <p
            id="aiStatusText">

                Monitoring live
                transit patterns

            </p>

        </div>

    </aside>

    <!-- CONTENT -->

    <main class="content-area">

        <!-- TAB 1 -->

        <section
            id="planner"
            class=
            "tab-content active">

            <div
            class="glass-card">

                <h2>
                    Route Planner
                </h2>

                <div
                class="route-grid">

                    <div>

                        <label>
                            Boarding From
                        </label>

                        <select
                        id="source">

                        {% for station
                        in stations %}

                        <option>
                        {{ station }}
                        </option>

                        {% endfor %}

                        </select>

                    </div>

                    <div>

                        <label>
                            Destination
                        </label>

                        <select
                        id=
                        "destination">

                        {% for station
                        in stations %}

                        <option>
                        {{ station }}
                        </option>

                        {% endfor %}

                        </select>

                    </div>

                </div>

                <button
                class="find-btn"
                onclick=
                "findRoute()">

                Find Smart Route

                </button>

            </div>

            <!-- MAP -->

            <div
            class="glass-card"
            style="
            margin-top:20px;
            ">

                <h2>
                    Live Transit Map
                </h2>

                <p
                style="
                color:#94a3b8;
                margin-top:8px;
                ">

                AI route
                visualization

                </p>

                <div
                id="map">

                </div>

            </div>

            <!-- AI PREDICTION -->

            <div
            class="glass-card"
            style="
            margin-top:20px;
            ">
             <div class="glass-card route-stops-card">

    <h2>
        Route Stops
    </h2>

    <div id="routeStops">

    </div>

</div>
                <h2>
                    AI Prediction
                </h2>

                <div
                id=
                "predictionContent"

                style="
                margin-top:
                20px;
                ">

                    Waiting for
                    route...

                </div>

            </div>

        </section>

        <!-- TAB 2 -->

        <section
            id="buses"
            class=
            "tab-content">

            <div
            class="glass-card">

                <div
                style="
                display:flex;
                justify-content:
                space-between;
                align-items:
                center;
                ">

                    <h2>
                        Active Buses
                    </h2>

                    <input
                    type="text"

                    id=
                    "busSearch"

                    placeholder=
                    "Search bus"

                    style="
                    padding:
                    14px;
                    border-radius:
                    14px;
                    border:none;
                    background:
                    rgba(
                    255,
                    255,
                    255,
                    0.08
                    );
                    color:white;
                    ">

                </div>

                <div
                id=
                "activeBusList"

                class=
                "bus-grid">

                </div>

            </div>

        </section>

        <!-- TAB 3 -->

        <section
            id=
            "insights"

            class=
            "tab-content">

            <div
            class=
            "glass-card">

                <h2>
                    AI Insights
                </h2>

                <div
                id=
                "insightCards">

                    <div
                    class=
                    "insight-box">

                        Waiting
                        for AI
                        analysis...

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>
<!-- LEAFLET -->

<script
src=
"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

// ------------------
// MAP
// ------------------

let map = L.map(
    "map"
).setView(
    [12.9716,77.5946],
    11
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:
    '&copy; OpenStreetMap'
}
).addTo(map);

let routeLine = null;
let stationMarkers = [];
let busMarkers = [];

// ------------------
// TAB SWITCH
// ------------------

function openTab(
    tabId,
    button
){

document
.querySelectorAll(
".tab-content"
)
.forEach(
tab =>
tab.classList.remove(
"active"
)
);

document
.querySelectorAll(
".tab-btn"
)
.forEach(
btn =>
btn.classList.remove(
"active"
)
);

document
.getElementById(
tabId
)
.classList.add(
"active"
);

button.classList.add(
"active"
);

setTimeout(
() =>
map.invalidateSize(),
300
);
}

// ------------------
// CLEAR MAP
// ------------------

function clearMap(){

stationMarkers
.forEach(
marker =>
map.removeLayer(
marker
)
);

stationMarkers = [];

busMarkers
.forEach(
marker =>
map.removeLayer(
marker
)
);

busMarkers = [];

if(routeLine){

map.removeLayer(
routeLine
);
}
}

// ------------------
// FIND ROUTE
// ------------------

async function
findRoute(){

const source =
document
.getElementById(
"source"
).value;

const destination =
document
.getElementById(
"destination"
).value;

const response =
await fetch(
"/get_route",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

source,
destination
})
}
);

const data =
await response.json();

let routeHTML = "";

data.route.forEach(
    stop => {

    routeHTML += `
    <div class="stop-card">
    ${stop}
    </div>
    `;
});

document.getElementById(
    "routeStops"
).innerHTML =
routeHTML;

clearMap();

// ------------------
// ROUTE COLOR
// ------------------

let routeColor =
"#22c55e";

if(
data.delay_risk
=== "Medium"
){
routeColor =
"#f59e0b";
}

if(
data.delay_risk
=== "High"
){
routeColor =
"#ef4444";
}

// ------------------
// MAP
// ------------------

const coords = [];

data.route_coordinates
.forEach(
station => {

coords.push([
station.lat,
station.lng
]);

const marker =
L.marker([
station.lat,
station.lng
])
.addTo(map)
.bindPopup(
station.station
);

stationMarkers.push(
marker
);

});

routeLine =
L.polyline(
coords,
{
color:
routeColor,

weight:8,

opacity:
0.95,

smoothFactor:
4
}
).addTo(map);

map.fitBounds(
routeLine.getBounds(),
{
padding:
[80,80]
}
);

// ------------------
// PREDICTION
// ------------------

document
.getElementById(
"predictionContent"
)
.innerHTML =

`
<div style="
display:grid;
grid-template-columns:
repeat(
2,1fr
);
gap:18px;
">

<div class=
"bus-card">

<h3>
ETA
</h3>

<p style="
font-size:
32px;
font-weight:
800;
margin-top:
8px;
">

${data.predicted_eta}
mins

</p>

</div>

<div class=
"bus-card">

<h3>
Distance
</h3>

<p style="
font-size:
32px;
font-weight:
800;
margin-top:
8px;
">

${data.distance_km}
km

</p>

</div>

<div class=
"bus-card">

<h3>
Delay Risk
</h3>

<p style="
font-size:
28px;
font-weight:
800;
margin-top:
8px;
">

${data.delay_risk}

</p>

</div>

<div class=
"bus-card">

<h3>
AI Confidence
</h3>

<p style="
font-size:
28px;
font-weight:
800;
margin-top:
8px;
">

${data.ai_confidence}%

</p>

</div>

</div>
`;

// ------------------
// ACTIVE BUSES
// ------------------

let busHTML = "";

data.buses.forEach(
bus => {

busHTML += `

<div
class=
"bus-card">

<h3>
${bus.bus_id}
</h3>

<p>
Current:
${bus.current_stop}
</p>

<p>
ETA:
${bus.eta}
mins
</p>

<p>
Status:
${bus.status}
</p>

</div>

`;
});

document
.getElementById(
"activeBusList"
)
.innerHTML =
busHTML;

// ------------------
// INSIGHTS
// ------------------

document.getElementById(
    "insightCards"
).innerHTML = `

<div class="insight-box">
    <h3>Traffic Level</h3>
    <p>${data.traffic_level}</p>
</div>

<div class="insight-box">
    <h3>Weather</h3>
    <p>${data.weather}</p>
</div>

<div class="insight-box">
    <h3>Delay Risk</h3>
    <p>${data.delay_risk}</p>
</div>

<div class="insight-box">
    <h3>AI Confidence</h3>
    <p>${data.ai_confidence}%</p>
</div>

`;

document
.getElementById(
"aiStatusText"
)
.innerText =

`Monitoring
${data.route.length}
stations with
AI confidence
${data.ai_confidence}%`;

}

// ------------------
// THEME
// ------------------


function toggleTheme(){

    document.body.classList.toggle(
        "light-mode"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains(
            "light-mode"
        )
        ? "light"
        : "dark"
    );
}
async function loadActiveBuses(){

    const response =
    await fetch(
        "/get_active_buses"
    );

    const buses =
    await response.json();

    let html = "";

    buses.forEach(bus => {

        html += `
        <div class="bus-card">

            <h3>
                🚌 ${bus.bus_no}
            </h3>

            <p>
                Route:
                ${bus.route}
            </p>

            <p>
                ETA:
                ${bus.eta}
            </p>

            <p>
                Occupancy:
                ${bus.occupancy}
            </p>

            <p>
                Status:
                ${bus.status}
            </p>

        </div>
        `;
    });

    document
    .getElementById(
        "activeBusList"
    ).innerHTML =
    html;
}
window.onload = function(){

    const savedTheme =
    localStorage.getItem(
        "theme"
    );

    if(savedTheme === "light"){

        document.body.classList.add(
            "light-mode"
        );
    }

    loadActiveBuses();

}

</script>

</body>
</html>
