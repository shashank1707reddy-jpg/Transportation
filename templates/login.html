<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMTC Smart Transit AI</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #2563eb
            );
            overflow:hidden;
        }

        .background-blur{
            position:absolute;
            width:600px;
            height:600px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            filter:blur(100px);
            top:-150px;
            left:-150px;
        }

        .background-blur2{
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(59,130,246,0.18);
            border-radius:50%;
            filter:blur(120px);
            bottom:-150px;
            right:-150px;
        }

        .login-card{
            width:400px;
            padding:40px;
            border-radius:25px;

            background:
            rgba(255,255,255,0.1);

            backdrop-filter:blur(20px);

            border:
            1px solid rgba(
                255,255,255,0.2
            );

            box-shadow:
            0 8px 32px rgba(
                0,0,0,0.3
            );

            color:white;
            z-index:2;
        }

        .title{
            text-align:center;
            margin-bottom:10px;
            font-size:30px;
            font-weight:bold;
        }

        .subtitle{
            text-align:center;
            margin-bottom:30px;
            opacity:0.8;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;

            border:none;
            border-radius:12px;

            outline:none;

            background:
            rgba(255,255,255,0.12);

            color:white;
            font-size:16px;
        }

        input::placeholder{
            color:#ddd;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;

            background:#2563eb;
            color:white;

            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .demo-box{
            margin-top:25px;
            font-size:14px;
            opacity:0.8;
            text-align:center;
        }

        .error{
            color:#ff8a8a;
            margin-top:12px;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="background-blur"></div>
<div class="background-blur2"></div>

<div class="login-card">

    <div class="title">
        BMTC Smart Transit AI
    </div>

    <div class="subtitle">
        Bengaluru Transit Optimization
    </div>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="login()">
        Login
    </button>

    <div
        class="error"
        id="error"
    ></div>

    <div class="demo-box">
        <p>
            Passenger Login:
            passenger / pass123
        </p>

        <p>
            Admin Login:
            admin / admin123
        </p>
    </div>

</div>

<script>

async function login(){

    const username =
    document.getElementById(
        "username"
    ).value;

    const password =
    document.getElementById(
        "password"
    ).value;

    const response =
    await fetch("/login", {

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            username,
            password
        })
    });

    const data =
    await response.json();

    if(data.success){

        if(
            data.role
            === "admin"
        ){
            window.location.href =
            "/admin";
        }

        else{
            window.location.href =
            "/passenger";
        }
    }

    else{

        document.getElementById(
            "error"
        ).innerText =
        "Invalid login";
    }
}

</script>

</body>
</html>
